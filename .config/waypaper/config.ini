[Settings]
language = en
backend = awww
folder = ~/wallpapersY
monitors = All
wallpaper = ~/wallpapersY/eunbi.jpeg
show_path_in_tooltip = True
fill = fill
sort = name
color = #000000
subfolders = False
all_subfolders = False
show_hidden = False
show_gifs_only = False
zen_mode = False
post_command = $HOME/.config/hypr/scripts/update_lockscreen.sh $wallpaper
number_of_columns = 3
swww_transition_type = any
swww_transition_step = 63
swww_transition_angle = 0
swww_transition_duration = 2
swww_transition_fps = 60
mpvpaper_sound = False
mpvpaper_options = -p '*' -o "no-audio --hwdec=auto"
use_xdg_state = False
stylesheet = /home/rodwell/.config/waypaper/style.css
keybindings = ~/.config/waypaper/keybindings.ini

